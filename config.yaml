filters:
  blacklist_keywords: ["广告", "推广"]
  blacklist_domains: []
  include_keywords: ["llm","强化学习","RL","agent"]
  min_content_length: 20
  score_threshold: 0.2
  semantic_filter:
    enabled: false
    similarity_threshold: 0.4

summarizer:
  enabled: true
  provider: "qwen_openai"
  api_key: "${DASHSCOPE_API_KEY}"
  model: "qwen3.5-flash"
  base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
  request_timeout_seconds: 100
  top_n: 30
  max_tokens: 500

push:
  enabled: false
  provider: "serverchan"
  serverchan_key: ""
  pushplus_token: ""
  top_n: 5

output:
  dir: "./output"

database_url: "sqlite:///./data/daily_signal.db"
