    platform: "zhihu"
    rss_url: "https://www.zhihu.com/rss"
    enabled: true
    source_weight: 0.75
  - name: "GitHub Trending"
    platform: "github"
    rss_url: "https://rsshub.app/github/trending/daily"
    enabled: false # temp disabled: rsshub.app returned 403
    source_weight: 0.9
